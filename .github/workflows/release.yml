name: Release

# Source-read-only release: the workflow never edits version files, never
# rewrites tags, and publishes the GitHub release only after PyPI succeeds.
# Version bumps land through a reviewed release-prep PR before dispatching.
#
# Recovery rule: published bytes, filenames, and tags are never replaced.
# A bad release is yanked on PyPI and fixed forward with a new patch version.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release — must equal the committed version (e.g., 0.8.0)"
        required: true
        type: string
      expected_sha:
        description: "Exact 40-character master commit to release — must match the dry run"
        required: true
        type: string
      publish_to_pypi:
        description: "Publish to PyPI (false = dry run: build, test, and retain artifacts only)"
        required: true
        default: true
        type: boolean
      create_draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Require master
        if: github.ref != 'refs/heads/master'
        env:
          REF: ${{ github.ref }}
        run: |
          echo "::error::Releases are dispatched from master only (got $REF)."
          exit 1

      - uses: actions/checkout@v7.0.0

      - name: Assert exact source commit
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          if ! [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::expected_sha must be a lowercase 40-character commit SHA (got $EXPECTED_SHA)."
            exit 1
          fi
          if [ "$GITHUB_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Source drift: expected $EXPECTED_SHA but this run resolved master to $GITHUB_SHA."
            echo "Repeat the dry run for the new commit before publishing."
            exit 1
          fi

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Stable versions only: PEP 440 normalizes prerelease names (0.9.0-alpha.1
          # -> 0.9.0a1) so raw prerelease input would break filename-based gating.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version: $VERSION. This workflow releases stable X.Y.Z versions only."
            exit 1
          fi

      - name: Assert committed version matches input (no source mutation)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PYPROJECT=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          MODULE=$(grep -m1 '^__version__ = ' src/hypster/_version.py | cut -d'"' -f2)
          if [ "$PYPROJECT" != "$VERSION" ] || [ "$MODULE" != "$VERSION" ]; then
            echo "::error::Version mismatch: input=$VERSION pyproject=$PYPROJECT _version.py=$MODULE."
            echo "Land a release-prep PR that sets both to $VERSION, then dispatch again."
            exit 1
          fi

      - name: Assert tag is absent or recoverable (tags are never rewritten)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --quiet
          if git tag -l | grep -qx "v$VERSION"; then
            TAG_SHA=$(git rev-list -n 1 "v$VERSION")
            if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
              echo "::error::Tag v$VERSION points to $TAG_SHA, not this release commit $GITHUB_SHA."
              echo "Released tags are immutable — bump to a new patch version instead."
              exit 1
            fi
            echo "Tag v$VERSION already points to this commit; allowing idempotent GitHub-release recovery."
          fi

      - name: Assert changelog section exists
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section. Releases without release notes are not published."
            exit 1
          fi

  test-and-build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.8"
          enable-cache: true
          python-version: "3.12"

      - name: Install project and dev deps
        run: uv sync --frozen --extra optuna --dev

      - name: Lint, type-check, test
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy src/hypster
          uv run pytest --no-cov -q

      - name: Build distributions
        run: |
          rm -rf dist/ build/
          uv build

      - name: Gate the artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: |
          test -f "dist/hypster-$VERSION-py3-none-any.whl" || { echo "::error::Wheel for $VERSION not found in dist/"; ls dist/; exit 1; }
          test -f "dist/hypster-$VERSION.tar.gz" || { echo "::error::Sdist for $VERSION not found in dist/"; ls dist/; exit 1; }

          uvx twine check --strict dist/*

          echo "Checking artifact manifests for files that must never ship..."
          WHEEL_LIST=$(python3 -m zipfile -l "dist/hypster-$VERSION-py3-none-any.whl")
          SDIST_LIST=$(tar -tzf "dist/hypster-$VERSION.tar.gz")
          for pattern in '\.backup' '__pycache__' '\.pyc' '^tests/' '/tests/' '^dev/' '/dev/' '\.env'; do
            if echo "$WHEEL_LIST" | grep -qE "$pattern"; then
              echo "::error::Wheel contains forbidden entry matching '$pattern'"; echo "$WHEEL_LIST"; exit 1
            fi
            if echo "$SDIST_LIST" | grep -qE "$pattern"; then
              echo "::error::Sdist contains forbidden entry matching '$pattern'"; echo "$SDIST_LIST"; exit 1
            fi
          done

          echo "Smoke testing wheel (isolated, asserting exact version)..."
          uv run --isolated --no-project --with "dist/hypster-$VERSION-py3-none-any.whl" \
            python -c "import hypster, os; v=os.environ['VERSION']; assert hypster.__version__ == v, f'wheel reports {hypster.__version__}, expected {v}'; import hypster.hpo"

          echo "Smoke testing sdist (isolated, asserting exact version)..."
          uv run --isolated --no-project --with "dist/hypster-$VERSION.tar.gz" \
            python -c "import hypster, os; v=os.environ['VERSION']; assert hypster.__version__ == v, f'sdist reports {hypster.__version__}, expected {v}'"

          echo "Running the real-Optuna suite against the built wheel (not the source checkout)..."
          uv run --isolated --no-project \
            --with "dist/hypster-$VERSION-py3-none-any.whl" --with pytest --with optuna \
            python -m pytest tests/test_hpo_optuna_real.py -q -p no:cacheprovider -o addopts=""

          (cd dist && shasum -a 256 ./* > SHA256SUMS)
          cat dist/SHA256SUMS

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ inputs.version }}
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    needs: [validate, test-and-build]
    if: ${{ inputs.publish_to_pypi }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.version }}
          path: dist

      - name: Remove checksum manifest from upload set
        run: rm -f dist/SHA256SUMS

      # pypa's action performs Trusted Publishing via OIDC and generates
      # PEP 740 attestations for the uploaded files by default.
      # skip-existing lets a rerun recover when PyPI accepted the files but a
      # later job failed; the github-release job re-verifies the published
      # hashes, so a silent skip can never tag bytes PyPI does not have.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  github-release:
    # Tag + public release happen only after PyPI accepted the same bytes.
    # Dry runs (publish_to_pypi=false) therefore never create tags or releases.
    needs: [validate, test-and-build, publish-pypi]
    if: ${{ !cancelled() && needs.publish-pypi.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.version }}
          path: dist

      - name: Verify PyPI serves exactly the bytes we built
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import time
          import urllib.request

          version = os.environ["VERSION"]
          local = {}
          with open("dist/SHA256SUMS") as fh:
              for line in fh:
                  digest, name = line.split()
                  name = name.lstrip("./")
                  if name != "SHA256SUMS":
                      local[name] = digest

          data = None
          for _ in range(12):
              try:
                  with urllib.request.urlopen(f"https://pypi.org/pypi/hypster/{version}/json") as resp:
                      data = json.load(resp)
                  break
              except Exception:
                  time.sleep(10)
          assert data is not None, f"PyPI never served metadata for {version}"

          remote = {u["filename"]: u["digests"]["sha256"] for u in data["urls"]}
          for name, digest in local.items():
              assert name in remote, f"{name} missing from PyPI"
              assert remote[name] == digest, f"{name}: PyPI has {remote[name]}, we built {digest}"
          print(f"PyPI serves the exact bytes we built: {sorted(local)}")
          PY

      - name: Extract changelog section
        env:
          VERSION: ${{ inputs.version }}
        run: |
          awk -v ver="$VERSION" '
            BEGIN { insec = 0; found = 0 }
            index($0, "## [" ver "]") == 1 { insec = 1; found = 1; print; next }
            /^## \[/ && insec { exit }
            insec { print }
            END { exit !found }
          ' CHANGELOG.md > release_notes.md
          {
            echo ""
            echo "---"
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "pip install hypster==$VERSION"
            echo "pip install 'hypster[optuna]==$VERSION'"
            echo "pip install 'hypster[viz]==$VERSION'"
            echo '```'
            echo ""
            echo "SHA-256 checksums of the published files are attached as SHA256SUMS."
          } >> release_notes.md

      - name: Create or recover tag and GitHub release with immutable artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v$VERSION"
          DRAFT_FLAG=""
          if [ "${{ inputs.create_draft }}" = "true" ]; then DRAFT_FLAG="--draft"; fi

          git fetch --tags --quiet
          if git tag -l | grep -qx "$TAG"; then
            TAG_SHA=$(git rev-list -n 1 "$TAG")
            if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
              echo "::error::$TAG points to $TAG_SHA, not $GITHUB_SHA; refusing to move it."
              exit 1
            fi
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            ACTUAL_DRAFT=$(gh release view "$TAG" --json isDraft --jq .isDraft)
            if [ "$ACTUAL_DRAFT" != "${{ inputs.create_draft }}" ]; then
              echo "::error::Existing $TAG draft state is $ACTUAL_DRAFT, expected ${{ inputs.create_draft }}."
              exit 1
            fi

            EXPECTED_ASSETS=$(for path in dist/*; do basename "$path"; done | sort)
            EXISTING_ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' | sort)
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              if ! echo "$EXPECTED_ASSETS" | grep -Fxq "$name"; then
                echo "::error::Existing $TAG contains unexpected immutable asset $name."
                exit 1
              fi
            done <<< "$EXISTING_ASSETS"

            for path in dist/*; do
              name=$(basename "$path")
              if echo "$EXISTING_ASSETS" | grep -Fxq "$name"; then
                verify_dir=$(mktemp -d)
                gh release download "$TAG" --pattern "$name" --dir "$verify_dir"
                if ! cmp -s "$path" "$verify_dir/$name"; then
                  echo "::error::Existing $TAG asset $name differs from the verified build; refusing replacement."
                  exit 1
                fi
                rm -rf "$verify_dir"
                echo "Verified existing immutable asset: $name"
              else
                gh release upload "$TAG" "$path"
                echo "Uploaded missing recovery asset: $name"
              fi
            done
          elif git tag -l | grep -qx "$TAG"; then
            gh release create "$TAG" \
              --verify-tag \
              --title "hypster v$VERSION" \
              --notes-file release_notes.md \
              $DRAFT_FLAG \
              dist/*
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "hypster v$VERSION" \
              --notes-file release_notes.md \
              $DRAFT_FLAG \
              dist/*
          fi

      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
        run: |
          {
            echo "## Release v$VERSION"
            echo ""
            echo "- Source SHA: \`$GITHUB_SHA\`"
            echo "- PyPI: published with Trusted Publishing + PEP 740 attestations"
            echo "- GitHub release: created after PyPI, with wheel, sdist, and SHA256SUMS attached"
          } >> "$GITHUB_STEP_SUMMARY"
