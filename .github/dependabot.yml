version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
    patterns:
      - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
    patterns:
      - "*"
    cooldown:
      default-days: 7
